
[global/wm]
margin-top = 0
margin-bottom = 0

[colors]
; The exact deep background from Tokyo Night
background = #16161e
foreground = #c0caf5
primary = #7aa2f7
secondary = #9ece6a
alert = #f7768e
disabled = #414868 

; Syntax Highlighting Colors
cyan = #7dcfff
magenta = #bb9af7
orange = #e0af68
blue = #7aa2f7

[bar/the_one_bar]
monitor = ${env:MONITOR:}
width = 100%
height = 34
radius = 0
fixed-center = true
bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3
line-color = ${colors.primary}

border-size = 0
border-color = #00000000

padding-left = 2
padding-right = 2

; Spacing and Separator
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

; Fonts - Font Awesome setup
; Increased sizes slightly and adjusted vertical offsets (;3, ;4) to keep them centered
font-0 = "JetBrains Mono NL:style=Bold:size=11;3"
font-1 = "Font Awesome 6 Free:style=Solid:size=13;4"
font-2 = "Font Awesome 6 Free:style=Regular:size=13;4"
font-3 = "Font Awesome 6 Brands:style=Regular:size=13;4"
font-4 = "Feather:size=13;4" 

modules-left = books filesystem cpu memory fan_speed workspace
modules-center = date time
modules-right = pulseaudio battery uptime tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/tray]
type = internal/tray
format-margin = 8px
tray-spacing = 8px
tray-size = 55%

[module/workspace]
type = internal/xworkspaces
; Flat styling with underlines instead of blocks
label-active = %name%
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/books]
type = custom/text
; Icon only, flat design
content = ""
content-foreground = ${colors.foreground}
content-padding = 0
click-left = xdg-open "$HOME/Books" &

[module/filesystem]
type = internal/fs
interval = 25
mount-0 = /
format-mounted-prefix = " "
format-mounted-prefix-foreground = ${colors.magenta}
label-mounted = %percentage_used%%
label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.cyan}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.magenta}
label = %percentage_used%%

[module/fan_speed]
type = custom/script
exec = ~/.config/polybar/polybar-scripts/system-fan-speed.sh
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.cyan}
label = %output%

[module/date]
type = internal/date
interval = 1
date = %b %d
label = %date%
format-prefix = " "
format-prefix-foreground = ${colors.blue}

[module/time]
type = internal/date
interval = 1
time = %H:%M
label = %time%
format-prefix = " "
format-prefix-foreground = ${colors.blue}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%

label-muted =  Muted
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.blue}
click-right = pavucontrol

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP1
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.blue}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.secondary}
animation-charging-framerate = 750

[module/uptime]
type = custom/script
exec = uptime -p | sed -e 's/up //g' -e 's/ weeks\?,/w/g' -e 's/ days\?,/d/g' -e 's/ hours\?,/h/g' -e 's/ minutes\?/m/g'
interval = 60
format-prefix = " "
format-prefix-foreground = ${colors.blue}
