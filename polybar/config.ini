

[colors]
; The exact deep background from Tokyo Night
background = #16161e
foreground = #c0caf5
primary = #7aa2f7
secondary = #9ece6a
alert = #f7768e
disabled = #414868 

; Syntax Highlighting Colors
cyan = #7dcfff
magenta = #bb9af7
orange = #e0af68
blue = #7aa2f7

[bar/the_one_bar]
monitor = ${env:MONITOR:}
width = 100%
height = 34
fixed-center = true
bottom = true

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3
line-color = ${colors.primary}


padding-left = 2
padding-right = 2

; Spacing and Separator
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}

; Fonts - Font Awesome setup
; Increased sizes slightly and adjusted vertical offsets (;3, ;4) to keep them centered
font-0 = "JetBrains Mono NL:style=Bold:size=11;3"
font-1 = "Font Awesome 6 Free:style=Solid:size=13;4"
font-2 = "Font Awesome 6 Free:style=Regular:size=13;4"
font-3 = "Font Awesome 6 Brands:style=Regular:size=13;4"
font-4 = "Feather:size=13;4" 

modules-left = books network cpu memory fan_speed workspace
modules-center = date time
modules-right = pulseaudio microphone bluetooth battery uptime tray

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/tray]
type = internal/tray
format-margin = 8px
tray-spacing = 8px
tray-size = 55%

[module/workspace]
type = internal/xworkspaces
; Flat styling with underlines instead of blocks
label-active = %name%
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/books]
type = custom/text
; Icon only, flat design
content = ""
content-foreground = ${colors.foreground}
content-padding = 0
click-left = xdg-open "$HOME/Books" &

[module/network]
type = internal/network
interface = wlp2s0
interval = 3
format-connected = <label-connected>
label-connected = %downspeed%
format-connected-padding = 0
label-disconnected = disconnected
label-disconnected-foreground = ${colors.disabled}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.cyan}
label = %percentage:2%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.magenta}
label = %percentage_used%%

[module/fan_speed]
type = custom/script
exec = ~/.config/polybar/polybar-scripts/system-fan-speed.sh
interval = 30
format-prefix = " "
format-prefix-foreground = ${colors.cyan}
label = %output%

[module/date]
type = internal/date
interval = 120
date = %b %d
date-alt = %b %d, %Y
label = %date%
format-prefix = " "
format-prefix-foreground = ${colors.blue}

[module/time]
type = internal/date
interval = 1
time = %H:%M
time-alt = %H:%M:%S
label = %time%
format-prefix = " "
format-prefix-foreground = ${colors.blue}

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true
interval = 5

format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%

label-muted = 
label-muted-foreground = ${colors.disabled}

ramp-volume-0 = 
ramp-volume-1 = 
ramp-volume-2 = 
ramp-volume-foreground = ${colors.blue}
click-right = pavucontrol

[module/microphone]
type = custom/script
exec = ~/.config/polybar/polybar-scripts/mic-status.sh
tail = true
click-left = pactl set-source-mute @DEFAULT_SOURCE@ toggle
click-right = pavucontrol
scroll-up = ~/.config/polybar/polybar-scripts/mic-scroll-up.sh
scroll-down = ~/.config/polybar/polybar-scripts/mic-scroll-down.sh

[module/bluetooth]
type = custom/script
exec = ~/.config/polybar/polybar-scripts/bluetooth-toggle.sh
interval = 5
click-left = ~/.config/polybar/polybar-scripts/bluetooth-click.sh

[module/battery]
type = internal/battery
full-at = 99
low-at = 15
battery = BAT0
adapter = ADP1
poll-interval = 5

format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-full = <ramp-capacity> <label-full>

label-charging = %percentage%%
label-discharging = %percentage%%
label-full = %percentage%%

ramp-capacity-0 = 
ramp-capacity-1 = 
ramp-capacity-2 = 
ramp-capacity-3 = 
ramp-capacity-4 = 
ramp-capacity-foreground = ${colors.blue}

animation-charging-0 = 
animation-charging-1 = 
animation-charging-2 = 
animation-charging-3 = 
animation-charging-4 = 
animation-charging-foreground = ${colors.secondary}
animation-charging-framerate = 750

[module/uptime]
type = custom/script
exec = ~/.config/polybar/polybar-scripts/uptime.sh
interval = 60
format-prefix = " "
format-prefix-foreground = ${colors.blue}
