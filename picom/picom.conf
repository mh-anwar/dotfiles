backend = "glx";

# Rounded corners
corner-radius = 10;
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];

# Shadows
shadow = true;
shadow-radius = 12;
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-opacity = 0.6;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@"
];

# Fading disabled — animations handle open/close instead
fading = false;

# Animations
animations = (
  {
    triggers = ["open", "show"];
    preset = "appear";
    duration = 0.2;
    scale = 0.95;
  },
  {
    triggers = ["close", "hide"];
    preset = "disappear";
    duration = 0.15;
    scale = 0.95;
  }
);

# Opacity — all disabled, no transparency
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Vsync
vsync = true;

# GLX backend options
glx-no-stencil = true;
glx-no-rebind-pixmap = true;
use-damage = true;
